name: Daily Jokker Analysis

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC every day
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to push the commit back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest draws (incremental)
        id: scraper
        run: |
          before=$(python -c "import json; d=json.load(open('data/jokker_results.json')); print(d['total_draws'])" 2>/dev/null || echo 0)
          python scraper/scraper.py --incremental
          after=$(python -c "import json; d=json.load(open('data/jokker_results.json')); print(d['total_draws'])")
          echo "new_draws=$(( after - before ))" >> $GITHUB_OUTPUT
          echo "Draws before: $before, after: $after"

      - name: Run analyzer
        if: steps.scraper.outputs.new_draws > 0
        env:
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
        run: python analyzer/analyzer.py

      - name: Commit results
        if: steps.scraper.outputs.new_draws > 0
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: daily analysis $(date -u '+%Y-%m-%d') (+${{ steps.scraper.outputs.new_draws }} draws)"
          git push origin main
